# Application Name
spring.application.name=product-service

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:productdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Embedded Server Port
server.port=8081

# Unleash Feature Flag Configuration
# ${VAR:default} — reads from environment variable, falls back to default if not set
# docker-compose.yml injects the correct values for each container
unleash.api-url=${UNLEASH_API_URL:http://localhost:4242/api}
unleash.app-name=${UNLEASH_APP_NAME:product-service}
unleash.instance-id=${HOSTNAME:product-service-1}
unleash.api-token=${UNLEASH_API_TOKEN:default:development.unleash-insecure-api-token}

# ---------- Assignment 4 ----------
# Part 1: Logging (ref. week12 'logging-lecture' lab)
# correlationId in log output
# logging.pattern.console=%d{HH:mm:ss} %-5level [%X{correlationId}] %logger{36} - %msg%n

# Part 2: Metrics (ref. week13 'metrics-prometheus-grafana' lab)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=product-service

# Part 3: Tracing (ref. week13 'tracing' lab)
management.tracing.sampling.probability=1.0
# Spring Boot 4.x property key (3.x was: management.zipkin.tracing.endpoint)
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans
# Spring Boot 4.x property key (3.x was: management.tracing.enabled)
management.tracing.export.enabled=true

# correlationId + traceId/spanId in log output
logging.pattern.console=%d{HH:mm:ss} %-5level [%X{correlationId}] [traceId=%X{traceId:-},spanId=%X{spanId:-}] %logger{36} - %msg%n