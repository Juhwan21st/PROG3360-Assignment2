# order-service v2 (green deployment)
# Updated fields from blue: name=-green, version=green, image=v2, APP_VERSION=v2-green
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-green
  namespace: prog3360-dinh-seo
  labels:
    app: order-service
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
      version: green
  template:
    metadata:
      labels:
        app: order-service
        version: green
    spec:
      containers:
        - name: order-service
          image: order-service:v2  # green = v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: APP_VERSION
              value: "v2-green"  # overrides ConfigMap APP_VERSION
          envFrom:
            - configMapRef:
                name: app-config
