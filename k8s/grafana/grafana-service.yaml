# Assignment 4 - Part 2: Grafana Service
#
# In the week13 lab, port exposure was handled by docker run -p 3000:3000.
# In K8s, a Service exposes the pod's port and enables port-forwarding:
#   kubectl port-forward svc/grafana 3000:3000 -n prog3360-dinh-seo
# Ref: lectures/PROG3360_week13_A4_Observability_Metrics_Prometheus_Grafana > Deploying Grafana to Minikube
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: prog3360-dinh-seo
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
