# Assignment 4 - Part 3: Zipkin Service

# In the week13 lab, port exposure was handled by docker run -p 9411:9411.
# In K8s, a Service exposes the pod's port and enables port-forwarding:
#   kubectl port-forward svc/zipkin 9411:9411 -n prog3360-dinh-seo
# Ref: lectures/PROG3360_week13_Tracing_Tutorial > Step 6
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: prog3360-dinh-seo
spec:
  selector:
    app: zipkin
  ports:
    - port: 9411
      targetPort: 9411
