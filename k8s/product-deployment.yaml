apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service-blue
  namespace: prog3360-assignment3
  labels:
    app: product-service
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
      version: blue
  template:
    metadata:
      labels:
        app: product-service
        version: blue
    spec:
      containers:
        - name: product-service
          image: product-service:1.0.0
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: application-properties-product-service
---
